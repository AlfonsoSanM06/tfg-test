{{- /*
  Secret con credenciales de MySQL.
  El nombre sigue la convención definida en _helpers.tpl (mysql-subchart.secretName)
  para que el chart padre pueda referenciarlo sin duplicar la lógica.

  AVISO: En producción, no almacenar passwords en el Chart.
  Usar External Secrets Operator o --set desde el pipeline CI/CD.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mysql-subchart.secretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "mysql-subchart.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.mysql.password | quote }}
  root-password: {{ .Values.mysql.rootPassword | quote }}
  # Fichero de configuración para mysqld-exporter
  .my.cnf: |
    [client]
    user={{ .Values.mysql.user }}
    password={{ .Values.mysql.password }}
    host=127.0.0.1
    port={{ .Values.service.port }}