apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "wordpress-mysql.fullname" . }}-test-connection"
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wordpress-mysql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "wordpress-mysql.serviceName" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
