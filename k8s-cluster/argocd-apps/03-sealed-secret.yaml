# =============================================================================
# SealedSecret: wordpress-mysql-secrets
# Generado con kubeseal — seguro para commitear en Git.
# El Sealed Secrets Controller (kube-system) lo descifra en tiempo real.
#
# INSTRUCCIONES PARA REGENERAR ESTE SECRET:
# -----------------------------------------
# 1. Instalar el controller (una sola vez, ver sealed-secrets en main.tf ArgoCD):
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system --version 2.16.1
#
# 2. Instalar kubeseal en tu máquina:
#    wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.0/kubeseal-0.26.0-linux-amd64.tar.gz
#    tar xzf kubeseal-*.tar.gz && sudo mv kubeseal /usr/local/bin/
#
# 3. Crear el secret en crudo y sellarlo:
#    kubectl create secret generic wordpress-mysql-secrets \
#      --from-literal=password='<TU_PASSWORD_MYSQL>' \
#      --from-literal=root-password='<TU_ROOT_PASSWORD>' \
#      --namespace wp \
#      --dry-run=client -o yaml | \
#      kubeseal --format yaml \
#        --controller-name sealed-secrets \
#        --controller-namespace kube-system \
#      > k8s-cluster/argocd-apps/03-sealed-secret.yaml
#
# 4. Commitear este fichero en Git (es seguro, está cifrado con la clave del cluster).
#
# IMPORTANTE: El SealedSecret está vinculado al namespace wp.
#             Si cambias el namespace, debes regenerarlo.
# =============================================================================
#
# PLACEHOLDER — Reemplaza este fichero con la salida real de kubeseal.
# El bloque encryptedData contendrá los valores cifrados reales.
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-mysql-secrets
  namespace: wp
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  # REEMPLAZAR con los valores cifrados reales generados por kubeseal
  encryptedData:
    password: "REEMPLAZAR_CON_KUBESEAL_OUTPUT"
    root-password: "REEMPLAZAR_CON_KUBESEAL_OUTPUT"
  template:
    metadata:
      name: wordpress-mysql-secrets
      namespace: wp
    type: Opaque
