# =============================================================================
# values/argocd.yaml — Configuración de ArgoCD para ARQ3D Systems
# Chart: argo-cd 7.x (ArgoCD v2.13.x)
# =============================================================================

# Con chart 7.x la imagen ya corresponde a v2.13.x por defecto.
# Solo sobreescribir si se necesita un parche específico:
# global:
#   image:
#     tag: "v2.13.5"

server:
  # Modo insecure: ArgoCD sirve HTTP en el puerto 80.
  # El Ingress NGINX actúa como terminador y hace el proxy.
  # NUNCA usar --insecure en producción real con tráfico externo.
  extraArgs:
    - --insecure

  # Recursos del servidor ArgoCD (ajustados para entorno de lab/TFG)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Métricas para Prometheus/Grafana (ya tienes Grafana en la arquitectura)
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false   # Activar cuando Prometheus esté desplegado en el clúster

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Redis integrado (backend de caché de ArgoCD)
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi